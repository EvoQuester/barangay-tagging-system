<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay Resident Profile Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="register-style.css">
    <style>
        /* CSS Patch for the Profile Search hidden listener field */
        #profile-scanner-input {
            position: absolute;
            opacity: 0.001;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
            z-index: -999;
            pointer-events: none;
        }
        .profile-edit-grid {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 2rem;
            margin-top: 1.5rem;
        }
        .avatar-preview-box {
            text-align: center;
        }
        .avatar-preview-box img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--accent-green);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            background-color: #cbd5e1;
        }
        .search-indicator-box {
            background-color: #f1f5f9;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        /* Layout adjustments for inline file selection styling on this grid */
        .profile-file-upload-container {
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-align: left;
        }
        .profile-file-upload-container label {
            font-size: 0.75rem !important;
            font-weight: 700;
            color: var(--text-muted);
        }
        .disabled-upload-btn {
            background-color: #cbd5e1 !important;
            color: #94a3b8 !important;
            cursor: not-allowed !important;
            border-color: var(--border-color) !important;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <header class="main-header">
            <h1>BARANGAY RESIDENT PROFILE MANAGER</h1>
            <p>Look Up, Update Core Information, and Upload Photo Images from Desktop</p>
            <a href="index.html" class="nav-link">← Back to Live Attendance Dashboard</a>
        </header>

        <input type="text" id="profile-scanner-input" autofocus autocomplete="off" placeholder="Awaiting lookup scan...">

        <div class="registration-layout" style="max-width: 850px;">
            
            <div class="search-indicator-box" id="search-zone">
                <span style="font-weight: 700; font-size: 0.9rem; color: var(--text-muted);">
                    🔒 Automatic Mode: Wave Wristband or Click Lookup to Search
                </span>
                <span id="lookup-status-text" class="status-indicator active-listening">Listening for Scan...</span>
            </div>

            <section class="card form-card">
                <h2>Modify Resident Master Record</h2>
                
                <form id="profile-update-form" autocomplete="off">
                    
                    <div class="profile-edit-grid">
                        
                        <div class="avatar-preview-box">
                            <label style="display:block; font-size:0.8rem; font-weight:700; margin-bottom:0.5rem; color:var(--text-muted);">
                                Profile Photo
                            </label>
                            <img id="edit-avatar-preview" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2394a3b8'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm0 14c-2.03 0-4.43-.82-6.14-2.88C7.55 15.8 9.68 15 12 15s4.45.8 6.14 2.12C16.43 19.18 14.03 20 12 20z'/></svg>" alt="Avatar Preview">
                            <p style="font-size:0.75rem; color:var(--text-muted); margin-top:0.5rem; font-family:monospace;" id="edit-id-label">ID: ---</p>
                            
                            <div class="profile-file-upload-container">
                                <label>Modify Image File</label>
                                <label for="edit-file-chooser" id="custom-file-btn-label" class="file-upload-label-btn disabled-upload-btn">📁 Change Photo</label>
                                <input type="file" id="edit-file-chooser" accept="image/*" disabled style="display: none;">
                                <span id="edit-file-status" style="font-size: 0.7rem; color: var(--text-muted); font-style: italic;">No file loaded</span>
                            </div>
                        </div>

                        <div>
                            <div class="form-group">
                                <label for="edit-name">Full Name (Last Name, First Name, M.I.)</label>
                                <input type="text" id="edit-name" required disabled placeholder="No resident loaded yet">
                            </div>

                            <div class="form-row-two-col">
                                <div class="form-group">
                                    <label for="edit-age">Resident Age</label>
                                    <input type="number" id="edit-age" required disabled min="0" max="120" placeholder="--">
                                </div>

                                <div class="form-group">
                                    <label for="edit-sector">Sector Classification</label>
                                    <select id="edit-sector" required disabled>
                                        <option value="" disabled selected>Select sector group...</option>
                                        <option value="General Resident">General Resident</option>
                                        <option value="PWD">PWD (Persons with Disabilities)</option>
                                        <option value="Senior Citizen">Senior Citizen</option>
                                        <option value="Solo Parent">Solo Parent</option>
                                        <option value="Youth / SK">Youth / SK (Sangguniang Kabataan)</option>
                                        <option value="Indigent / 4Ps">Indigent / 4Ps Beneficiary</option>
                                        <option value="BHW / Staff">Barangay Health Worker (BHW) / Staff</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="edit-address">Complete Address (Sitio/Purok/Street)</label>
                                <input type="text" id="edit-address" required disabled placeholder="No resident loaded yet">
                            </div>

                            <div class="form-group">
                                <label for="edit-emergency">Emergency Contact (Name & Active Number)</label>
                                <input type="text" id="edit-emergency" required disabled placeholder="No resident loaded yet">
                            </div>
                        </div>

                    </div>

                    <button type="submit" class="btn-primary" id="update-form-btn" style="margin-top: 1.5rem;" disabled>💾 Save Profile Changes</button>
                </form>
            </section>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('profile-scanner-input');
        const lookupStatusText = document.getElementById('lookup-status-text');
        const searchZone = document.getElementById('search-zone');
        const form = document.getElementById('profile-update-form');
        
        // Input Controls array references
        const inputs = [
            document.getElementById('edit-name'),
            document.getElementById('edit-age'),
            document.getElementById('edit-sector'),
            document.getElementById('edit-address'),
            document.getElementById('edit-emergency')
        ];
        
        // FIXED: Pointed variable target selector accurately to 'update-form-btn'
        const updateFormBtn = document.getElementById('update-form-btn');
        const avatarPreview = document.getElementById('edit-avatar-preview');
        const idLabel = document.getElementById('edit-id-label');
        
        // File Chooser Target Selectors
        const fileChooser = document.getElementById('edit-file-chooser');
        const fileStatus = document.getElementById('edit-file-status');
        const customFileBtnLabel = document.getElementById('custom-file-btn-label');

        const DEFAULT_SVG = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2394a3b8'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm0 14c-2.03 0-4.43-.82-6.14-2.88C7.55 15.8 9.68 15 12 15s4.45.8 6.14 2.12C16.43 19.18 14.03 20 12 20z'/></svg>";
        let loadedWristbandId = ""; 
        let updatedBase64ImageString = ""; 

        // Automated continuous background focus lock
        function keepSearchFocused() {
            const clickingOtherField = document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT';
            if (!clickingOtherField) {
                searchInput.focus();
            }
        }
        searchInput.focus();
        document.addEventListener('click', () => setTimeout(keepSearchFocused, 50));

        // Re-ignite focus when header bar indicator is clicked manually
        searchZone.addEventListener('click', (e) => {
            e.stopPropagation();
            searchInput.focus();
            lookupStatusText.textContent = "Listening for Scan...";
            lookupStatusText.className = "status-indicator active-listening";
        });

        /* ==========================================================================
           DESKTOP FILE SELECTION INTERCEPTION LOGIC
           ========================================================================== */
        fileChooser.addEventListener('change', function() {
            const file = this.files[0];
            if (!file) return;

            fileStatus.textContent = `Selected: ${file.name}`;

            const reader = new FileReader();
            reader.onload = function(e) {
                updatedBase64ImageString = e.target.result; // Conversion format string
                avatarPreview.src = updatedBase64ImageString; // Repaint circle element layout preview frame instantly
            };
            reader.readAsDataURL(file);
        });

        /* ==========================================================================
           AUTOMATIC LOOKUP INTERCEPTION SCAN ROUTINE
           ========================================================================== */
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const searchId = this.value.trim();
                this.value = ''; 
                
                if (!searchId) return;

                lookupStatusText.textContent = "Searching...";
                lookupStatusText.className = "status-indicator waiting";

                fetch(`/api/residents/${searchId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        lookupStatusText.textContent = "Profile Loaded!";
                        lookupStatusText.className = "status-indicator linked";
                        
                        loadedWristbandId = data.resident.wristband_id;
                        idLabel.textContent = `ID: ${loadedWristbandId}`;
                        avatarPreview.src = data.resident.profile_pic || DEFAULT_SVG;
                        updatedBase64ImageString = data.resident.profile_pic || DEFAULT_SVG; 

                        // Unlock input fields and upload triggers
                        inputs.forEach(input => input.removeAttribute('disabled'));
                        fileChooser.removeAttribute('disabled');
                        customFileBtnLabel.classList.remove('disabled-upload-btn');
                        updateFormBtn.removeAttribute('disabled');

                        document.getElementById('edit-name').value = data.resident.full_name;
                        document.getElementById('edit-age').value = data.resident.age;
                        document.getElementById('edit-sector').value = data.resident.sector;
                        document.getElementById('edit-address').value = data.resident.complete_address;
                        document.getElementById('edit-emergency').value = data.resident.emergency_contact;
                        fileStatus.textContent = "Loaded current photo";
                    } else {
                        lookupStatusText.textContent = "NOT FOUND";
                        lookupStatusText.className = "status-indicator waiting";
                        alert('⚠️ ' + data.message);
                    }
                })
                .catch(err => console.error('Lookup processing framework breakdown:', err));
            }
        });

        /* ==========================================================================
           PUT API MODIFICATION PAYLOAD DISPATCH ROUTINE
           ========================================================================== */
        form.addEventListener('submit', function(e) {
            e.preventDefault(); 

            const updatedPayload = {
                wristband_id: loadedWristbandId,
                name: document.getElementById('edit-name').value,
                age: document.getElementById('edit-age').value,
                sector: document.getElementById('edit-sector').value,
                address: document.getElementById('edit-address').value,
                emergency_contact: document.getElementById('edit-emergency').value,
                profile_pic: updatedBase64ImageString 
            };

            fetch('/api/residents/update', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updatedPayload)
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('✅ SUCCESS!\nResident master configuration profile fields updated successfully inside PostgreSQL.');
                    
                    form.reset();
                    idLabel.textContent = "ID: ---";
                    avatarPreview.src = DEFAULT_SVG;
                    updatedBase64ImageString = "";
                    fileStatus.textContent = "No file loaded";
                    
                    // Relock interactive components smoothly
                    inputs.forEach(input => input.setAttribute('disabled', 'true'));
                    fileChooser.setAttribute('disabled', 'true');
                    customFileBtnLabel.classList.add('disabled-upload-btn');
                    updateFormBtn.setAttribute('disabled', 'true');
                    
                    lookupStatusText.textContent = "Listening for Scan...";
                    lookupStatusText.className = "status-indicator active-listening";
                    searchInput.focus();
                } else {
                    alert('❌ Modification transaction rejected: ' + data.message);
                }
            })
            .catch(err => console.error('Failed to dispatch update array package:', err));
        });
    </script>
</body>
</html>
