<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay Resident Profile Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="register-style.css">
    <style>
        #profile-scanner-input {
            position: absolute; opacity: 0.001; top: 0; left: 0; width: 1px; height: 1px; z-index: -999; pointer-events: none;
        }
        .profile-edit-grid {
            display: grid; grid-template-columns: 200px 1fr; gap: 2rem; margin-top: 1.5rem;
        }
        .avatar-preview-box { text-align: center; }
        .avatar-preview-box img {
            width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid var(--accent-green); box-shadow: 0 4px 8px rgba(0,0,0,0.1); background-color: #cbd5e1;
        }
        .disabled-upload-btn { opacity: 0.5; cursor: not-allowed !important; background-color: #f1f5f9 !important; color: #94a3b8 !important; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <header class="main-header">
            <h1>BARANGAY RESIDENT MASTER RECORD MANAGEMENT PORTAL</h1>
            <p>Scan Registry ID Key Tokens to Edit Core Resident Profiling Parameters</p>
            <a href="index.html" class="nav-link">← Return to Live Monitoring Operation Console</a>
        </header>

        <input type="text" id="profile-scanner-input" autofocus autocomplete="off" placeholder="Awaiting master key pass tracking code...">

        <div class="registration-layout" style="max-width: 850px;">
            <section class="card form-card">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 0.75rem; margin-bottom: 1rem;">
                    <h2 style="margin: 0;">Resident Profile Modifier Matrix</h2>
                    <span id="lookup-status-tag" class="status-indicator active-listening">Listening for Scan...</span>
                </div>

                <div class="profile-edit-grid">
                    
                    <div class="avatar-preview-box">
                        <label style="font-size: 0.8rem; font-weight: 700; color: var(--text-muted); display: block; margin-bottom: 0.5rem;">Resident Photo</label>
                        <img id="profile-avatar-preview" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2394a3b8'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm0 14c-2.03 0-4.43-.82-6.14-2.88C7.55 15.8 9.68 15 12 15s4.45.8 6.14 2.12C16.43 19.18 14.03 20 12 20z'/></svg>" alt="Resident Profile Picture">
                        
                        <div style="margin-top: 1rem;">
                            <label for="edit-file-chooser" id="custom-file-btn-label" class="btn-secondary disabled-upload-btn" style="padding: 0.4rem 0.75rem; font-size: 0.75rem; font-weight: 700; display: inline-block; border: 1px solid #cbd5e1; border-radius: 4px; cursor: pointer;">🔄 Update Photo</label>
                            <input type="file" id="edit-file-chooser" accept="image/*" style="display: none;" disabled>
                            <div id="edit-file-status" style="font-size: 0.65rem; color: var(--text-muted); margin-top: 0.3rem;">No file loaded</div>
                        </div>
                    </div>

                    <form id="profile-update-form" autocomplete="off" style="margin: 0;">
                        <div style="margin-bottom: 1rem;"><span id="display-system-id" style="font-weight: 800; font-size: 0.9rem; background-color: #f1f5f9; padding: 4px 8px; border-radius: 4px; color: #1e293b; font-family: monospace;">System ID: ---</span></div>

                        <div class="form-group">
                            <label for="edit-name">Full Name (Last Name, First Name, M.I.)</label>
                            <input type="text" id="edit-name" required disabled>
                        </div>

                        <div class="form-row-two-col">
                            <div class="form-group">
                                <label for="edit-age">Resident Age</label>
                                <input type="number" id="edit-age" required min="0" max="150" disabled>
                            </div>

                            <div class="form-group">
                                <label for="edit-sector">Sector Classification</label>
                                <select id="edit-sector" required disabled>
                                    <option value="General Resident">General Resident</option>
                                    <option value="PWD (Persons with Disabilities)">PWD (Persons with Disabilities)</option>
                                    <option value="Senior Citizen">Senior Citizen</option>
                                    <option value="Solo Parent">Solo Parent</option>
                                    <option value="Youth / SK (Sangguniang Kabataan)">Youth / SK (Sangguniang Kabataan)</option>
                                    <option value="Barangay Health Worker (BHW) / Staff">Barangay Health Worker (BHW) / Staff</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="edit-address">Complete Address</label>
                            <input type="text" id="edit-address" required disabled>
                        </div>

                        <div class="form-group">
                            <label for="edit-emergency">Emergency Contact Information</label>
                            <input type="text" id="edit-emergency" required disabled>
                        </div>

                        <button type="submit" id="update-submit-btn" class="btn-primary" style="width: 100%; padding: 0.75rem; margin-top: 0.5rem;" disabled>💾 SAVE RECORD CHANGES TO CORE</button>
                    </form>

                </div>
            </section>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('profile-scanner-input');
        const lookupStatusText = document.getElementById('lookup-status-tag');
        const idLabel = document.getElementById('display-system-id');
        const form = document.getElementById('profile-update-form');
        
        const inputs = [
            document.getElementById('edit-name'),
            document.getElementById('edit-age'),
            document.getElementById('edit-sector'),
            document.getElementById('edit-address'),
            document.getElementById('edit-emergency')
        ];
        
        const fileChooser = document.getElementById('edit-file-chooser');
        const customFileBtnLabel = document.getElementById('custom-file-btn-label');
        const fileStatus = document.getElementById('edit-file-status');
        const avatarPreview = document.getElementById('profile-avatar-preview');
        const updateFormBtn = document.getElementById('update-submit-btn');

        const DEFAULT_SVG = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2394a3b8'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm0 14c-2.03 0-4.43-.82-6.14-2.88C7.55 15.8 9.68 15 12 15s4.45.8 6.14 2.12C16.43 19.18 14.03 20 12 20z'/></svg>";
        let activeLoadedResidentId = "";
        let updatedBase64ImageString = "";

        function keepSearchFieldFocused() {
            if (document.activeElement !== fileChooser && !inputs.includes(document.activeElement)) {
                searchInput.focus();
            }
        }
        searchInput.focus();
        document.addEventListener('click', () => setTimeout(keepSearchFieldFocused, 60));

        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const searchString = this.value.trim();
                this.value = '';
                if (!searchString) return;

                lookupStatusText.textContent = "Searching Pipeline...";
                lookupStatusText.className = "status-indicator active-listening";

                fetch(`/api/residents/${searchString}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            lookupStatusText.textContent = "⚙️ PROFILE UNLOCKED - EDITABLE";
                            lookupStatusText.className = "status-indicator linked";
                            
                            activeLoadedResidentId = data.resident.resident_id;
                            idLabel.textContent = `System ID Key: ${data.resident.resident_id}`;
                            
                            document.getElementById('edit-name').value = data.resident.full_name;
                            document.getElementById('edit-age').value = data.resident.age;
                            document.getElementById('edit-sector').value = data.resident.sector;
                            document.getElementById('edit-address').value = data.resident.complete_address;
                            document.getElementById('edit-emergency').value = data.resident.emergency_contact;
                            
                            let picSrc = DEFAULT_SVG;
                            if (data.resident.profile_pic && data.resident.profile_pic.trim().startsWith("data:image")) {
                                picSrc = data.resident.profile_pic.trim();
                            }
                            avatarPreview.src = picSrc;
                            updatedBase64ImageString = data.resident.profile_pic || "";
                            fileStatus.textContent = "Using active synced server photo";

                            inputs.forEach(input => input.removeAttribute('disabled'));
                            fileChooser.removeAttribute('disabled');
                            customFileBtnLabel.classList.remove('disabled-upload-btn');
                            updateFormBtn.removeAttribute('disabled');
                        } else {
                            lookupStatusText.textContent = "❌ RECORD NOT FOUND";
                            lookupStatusText.className = "status-indicator waiting";
                            alert("Profile query link rejected: Target search key token string was not resolved.");
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        lookupStatusText.textContent = "Listening for Scan...";
                    });
            }
        });

        fileChooser.addEventListener('change', function() {
            const file = this.files[0];
            if (!file) return;

            if (file.size > 15 * 1024 * 1024) {
                alert("⚠️ IMAGE MAX BOUND OUT OF RANGE:\nFile upload packets cannot cross 15 Megabytes size index.");
                this.value = "";
                return;
            }
            fileStatus.textContent = `Queued: ${file.name}`;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                avatarPreview.src = e.target.result;
                updatedBase64ImageString = e.target.result;
            };
            reader.readAsDataURL(file);
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (!activeLoadedResidentId) return;

            const updatedPayload = {
                resident_id: activeLoadedResidentId,
                name: document.getElementById('edit-name').value.trim(),
                age: document.getElementById('edit-age').value,
                sector: document.getElementById('edit-sector').value,
                address: document.getElementById('edit-address').value.trim(),
                emergency_contact: document.getElementById('edit-emergency').value.trim(),
                profile_pic: updatedBase64ImageString
            };

            fetch('/api/residents/update', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updatedPayload)
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('✅ SUCCESS!\nResident configuration profile fields updated successfully inside PostgreSQL.');
                    form.reset();
                    idLabel.textContent = "System ID: ---";
                    avatarPreview.src = DEFAULT_SVG;
                    updatedBase64ImageString = "";
                    fileStatus.textContent = "No file loaded";
                    
                    inputs.forEach(input => input.setAttribute('disabled', 'true'));
                    fileChooser.setAttribute('disabled', 'true');
                    customFileBtnLabel.classList.add('disabled-upload-btn');
                    updateFormBtn.setAttribute('disabled', 'true');
                    
                    lookupStatusText.textContent = "Listening for Scan...";
                    lookupStatusText.className = "status-indicator active-listening";
                    searchInput.focus();
                } else {
                    alert('❌ Modification transaction rejected: ' + data.message);
                }
            })
            .catch(err => console.error('Failed to dispatch update array package:', err));
        });
    </script>
</body>
</html>
